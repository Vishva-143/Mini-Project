{% extends "base.html" %}
{% block title %}AI Assistant{% endblock %}

{% block content %}

<div class="card p-4">

<h5 class="mb-3">🤖 Academic Assistant</h5>

<form method="POST">
    <input name="question" class="form-control mb-3" placeholder="Ask about students, topper, average, weak subject..." required>
    
    <button class="btn btn-primary w-100">Ask AI</button>
</form>

<div class="mt-3">
    <small>Quick Questions:</small><br>
    <a href="?q=topper" class="btn btn-outline-light btn-sm mt-2">Topper</a>
    <a href="?q=average" class="btn btn-outline-light btn-sm mt-2">Average</a>
    <a href="?q=weak" class="btn btn-outline-light btn-sm mt-2">Weak Students</a>
</div>

{% if answer %}
<div class="alert alert-success mt-4">
    {{ answer }}
</div>
{% endif %}

</div>

{% endblock %}
